<!DOCTYPE html>
<html><head><meta charset="utf-8"></head><body>
<div id="root"></div>
<script type="module">
import widget from '/dist/widgets/predict-then-check.js';

const state = {
  question: 'What does this code print?',
  code: 'x = 2 + 2\nprint(x)',
  output: '4',
  options: ['2', '4', '22'],
  correct_answer: 1,
  explanations: [
    'Wrong: + here is addition, not string concatenation.',
    'Correct: 2 + 2 = 4.',
    'Wrong: that result would require string concatenation.',
  ],
  lang: 'en',
  value: null,
};
const setCalls = [];
const model = {
  get: (k) => state[k],
  set: (k, v) => { state[k] = v; setCalls.push([k, v]); },
  save_changes: () => {},
  on: () => {},
};
window._state = state;
window._setCalls = setCalls;
widget.render({ model, el: document.getElementById('root') });
</script>
</body></html>
